name: textbook_video_learning
description: Child-first client for the textbook-to-video learning platform.
publish_to: none
version: 0.1.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.8.0+1
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  shared_preferences: ^2.3.3
  video_player: ^2.9.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/

flutter_launcher_icons:
  android: true
  ios: true

  image_path: "assets/icons/app_icon.png"

  adaptive_icon_background: "#0F4C5C"
  adaptive_icon_foreground: "assets/icons/app_icon.png"

  remove_alpha_ios: true